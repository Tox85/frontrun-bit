name = "bithumb-proxy"
main = "worker.js"
compatibility_date = "2024-01-15"

[env.production]
name = "bithumb-proxy"

[env.staging]
name = "bithumb-proxy-staging"

# Configuration des routes (optionnel)
# routes = [
